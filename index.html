<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackjack Arena - Conexão Total</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; color: white; }
        
        /* MODAIS DE RESULTADO */
        .modal-alerta { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .modal-alerta img { width: 280px; border-radius: 20px; margin-bottom: 15px; }

        #mesa { width: 100vw; height: 100vh; background: radial-gradient(circle at center, #155d2c 0%, #0a2d16 100%); display: flex; flex-direction: column; align-items: center; justify-content: space-between; border: 8px solid #2c1e14; box-sizing: border-box; }

        .scoreboard { display: flex; justify-content: space-between; width: 95%; background: rgba(0,0,0,0.85); padding: 10px; border-radius: 15px; border: 1px solid #444; margin-top: 10px; align-items: center; }
        .score-val { display: block; font-size: 1.5rem; color: #ffcc00; font-weight: bold; }
        .mini-av { width: 45px; height: 45px; border-radius: 50%; border: 2px solid gold; background-size: cover; background-color: #333; }

        .turn-indicator { padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; border: 1px solid #555; }
        .active-turn { background: #ffcc00; color: #000; box-shadow: 0 0 10px #ffcc00; }

        .avatar-main { width: 80px; height: 80px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.4); background-size: cover; background-color: #222; }
        .hand { display: flex; gap: -45px; min-height: 110px; padding-left: 45px; margin-top: 10px; }
        .card { width: 75px; height: 105px; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; color: black; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); margin-left: -45px; animation: deal 0.3s ease-out; }
        
        @keyframes deal { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .controls { width: 100%; display: flex; justify-content: space-evenly; padding-bottom: 25px; }
        .btn-game { width: 75px; height: 75px; border-radius: 50%; border: 4px solid white; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-hit { background: #0066ff; }
        .btn-stay { background: #dd0000; }
        .disabled { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        
        #overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px; }
        .avatar-opt { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #333; background-size: cover; cursor: pointer; }
        .selected { border-color: gold; transform: scale(1.1); box-shadow: 0 0 10px gold; }
    </style>
</head>
<body>

<audio id="snd-card" src="https://files.catbox.moe/n9jekp.m4a"></audio>
<audio id="snd-boom" src="https://files.catbox.moe/vydo44.mp3"></audio>
<audio id="snd-win" src="https://files.catbox.moe/p6x15o.mp3"></audio>

<div id="modal-perdeu" class="modal-alerta">
    <img src="https://files.catbox.moe/2hwdjc.gif">
    <h2 style="color: #ff4444;">BOOM!</h2>
    <button style="padding: 15px 30px; background: white; border-radius: 10px; font-weight: bold; border: none;" onclick="resetarPartida()">NOVA CHANCE</button>
</div>

<div id="modal-ganhou" class="modal-alerta">
    <img src="https://files.catbox.moe/39b2od.gif">
    <h2 style="color: #ffcc00;">VOCÊ GANHOU!</h2>
    <button style="padding: 15px 30px; background: #ffcc00; border-radius: 10px; font-weight: bold; border: none;" onclick="resetarPartida()">JOGAR NOVAMENTE</button>
</div>

<div id="overlay">
    <h2 style="color: gold">CONECTANDO...</h2>
    <div class="avatar-grid" id="avatarGrid"></div>
    <div style="display: flex; gap: 15px;">
        <button onclick="escolherRole('Ele')" id="btnEle" style="padding: 12px 25px; background: #0066ff; color: white; border: none; border-radius: 5px;">ELE</button>
        <button onclick="escolherRole('Ela')" id="btnEla" style="padding: 12px 25px; background: #ff007f; color: white; border: none; border-radius: 5px;">ELA</button>
    </div>
    <button id="btnEntrar" style="margin-top: 20px; padding: 15px 40px; background: gold; display: none; font-weight: bold; border-radius: 30px; border: none;" onclick="iniciar()">JOGAR</button>
</div>

<div id="mesa">
    <div class="scoreboard">
        <div style="text-align: center;">
            <div id="mini-ele" class="mini-av"></div>
            <span id="p-ele" class="score-val">0</span>
        </div>
        <div id="status-turno" class="turn-indicator">AGUARDANDO</div>
        <div style="text-align: center;">
            <div id="mini-ela" class="mini-av"></div>
            <span id="p-ela" class="score-val">0</span>
        </div>
    </div>

    <div class="avatar-main" id="img-oponente"></div>
    
    <div style="display: flex; flex-direction: column; align-items: center;">
        <div id="txt-soma" style="font-weight: bold; color: #ffcc00;">Soma: 0</div>
        <div class="hand" id="minhas-cartas"></div>
        <div class="avatar-main" id="img-eu"></div>
    </div>

    <div class="controls" id="botoes">
        <div class="btn-game btn-hit" onclick="pedirCarta()">PEDIR</div>
        <div class="btn-game btn-stay" onclick="parar()">PARAR</div>
    </div>
</div>

<script>
    // Inicialização direta do Firebase para evitar erros de versão
    const config = { databaseURL: "https://project-a3660c8f-d710-41a4-a09-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    const database = firebase.database().ref("blackjack_v15_stable");

    let meuPapel = "", meuAvatar = "";
    const audios = { card: document.getElementById('snd-card'), boom: document.getElementById('snd-boom'), win: document.getElementById('snd-win') };

    // Galeria de avatares
    const nomes = ["Jack", "Milo", "Jasper", "Leo", "Oliver", "Aneka", "Luna", "Zoe", "Sasha", "Mia"];
    nomes.forEach(n => {
        const url = `https://api.dicebear.com/7.x/avataaars/svg?seed=${n}`;
        const div = document.createElement('div');
        div.className = "avatar-opt"; div.style.backgroundImage = `url('${url}')`;
        div.onclick = () => {
            meuAvatar = url;
            document.querySelectorAll('.avatar-opt').forEach(e => e.classList.remove('selected'));
            div.classList.add('selected');
            if(meuPapel) document.getElementById('btnEntrar').style.display = 'block';
        };
        document.getElementById('avatarGrid').appendChild(div);
    });

    function escolherRole(r) {
        meuPapel = r;
        document.getElementById('btnEle').style.boxShadow = r==='Ele'?'0 0 10px white':'none';
        document.getElementById('btnEla').style.boxShadow = r==='Ela'?'0 0 10px white':'none';
        if(meuAvatar) document.getElementById('btnEntrar').style.display = 'block';
    }

    function iniciar() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('img-eu').style.backgroundImage = `url('${meuAvatar}')`;
        database.update({ [meuPapel === 'Ele' ? 'avEle' : 'avEla']: meuAvatar });
        database.once('value', s => { if(!s.val() || !s.val().turno) database.update({ turno: 'Ele', estado: 'jogando' }); });
    }

    // LISTENER EM TEMPO REAL
    database.on('value', (s) => {
        const d = s.val() || {};
        
        // Reset Forçado de Telas
        if(d.estado === 'resetando') {
            document.getElementById('modal-ganhou').style.display = 'none';
            document.getElementById('modal-perdeu').style.display = 'none';
            return;
        }

        // Atualiza Interface
        document.getElementById('p-ele').innerText = d.pEle || 0;
        document.getElementById('p-ela').innerText = d.pEla || 0;
        if(d.avEle) document.getElementById('mini-ele').style.backgroundImage = `url('${d.avEle}')`;
        if(d.avEla) document.getElementById('mini-ela').style.backgroundImage = `url('${d.avEla}')`;
        const opAv = meuPapel === 'Ele' ? d.avEla : d.avEle;
        if(opAv) document.getElementById('img-oponente').style.backgroundImage = `url('${opAv}')`;

        // Turno
        const ind = document.getElementById('status-turno');
        const bts = document.getElementById('botoes');
        if(d.turno === meuPapel) {
            ind.innerText = "SUA VEZ"; ind.className = "turn-indicator active-turn";
            bts.classList.remove('disabled');
        } else {
            ind.innerText = "VEZ DE " + (d.turno || '...'); ind.className = "turn-indicator";
            bts.classList.add('disabled');
        }

        // Cartas
        const minhas = meuPapel === 'Ele' ? (d.cEle || []) : (d.cEla || []);
        const area = document.getElementById('minhas-cartas');
        if(minhas.length > area.children.length) { audios.card.play(); }
        area.innerHTML = "";
        let soma = 0;
        minhas.forEach(n => {
            soma += n;
            const c = document.createElement('div'); c.className = "card"; c.innerText = n; area.appendChild(c);
        });
        document.getElementById('txt-soma').innerText = "Soma: " + soma;

        // Verificar Vencedor no Firebase
        if(d.vencedorRodada) {
            if(d.vencedorRodada === meuPapel) {
                document.getElementById('modal-ganhou').style.display = 'flex';
                audios.win.play();
            } else if(d.vencedorRodada !== 'Empate') {
                document.getElementById('modal-perdeu').style.display = 'flex';
                audios.boom.play();
            } else {
                resetarPartida(); // Auto-reset em empate
            }
        }
    });

    function pedirCarta() {
        const n = Math.floor(Math.random() * 10) + 2;
        database.once('value', s => {
            let d = s.val();
            let mao = meuPapel === 'Ele' ? (d.cEle || []) : (d.cEla || []);
            mao.push(n);
            let soma = mao.reduce((a,b)=>a+b, 0);
            let up = { [meuPapel === 'Ele' ? 'cEle' : 'cEla']: mao };
            
            if(soma > 21) {
                let ganhou = meuPapel === 'Ele' ? 'Ela' : 'Ele';
                up.vencedorRodada = ganhou;
                up.pEle = (d.pEle || 0) + (ganhou === 'Ele' ? 1 : 0);
                up.pEla = (d.pEla || 0) + (ganhou === 'Ela' ? 1 : 0);
            }
            database.update(up);
        });
    }

    function parar() {
        database.once('value', s => {
            let d = s.val();
            let prox = meuPapel === 'Ele' ? 'Ela' : 'Ele';
            let up = { turno: prox, [meuPapel === 'Ele' ? 'stopEle' : 'stopEla']: true };
            
            if((meuPapel === 'Ele' && d.stopEla) || (meuPapel === 'Ela' && d.stopEle)) {
                let sEle = (d.cEle || []).reduce((a,b)=>a+b,0);
                let sEla = (d.cEla || []).reduce((a,b)=>a+b,0);
                let v = sEle > sEla ? 'Ele' : (sEla > sEle ? 'Ela' : 'Empate');
                up.vencedorRodada = v;
                if(v === 'Ele') up.pEle = (d.pEle || 0) + 1;
                if(v === 'Ela') up.pEla = (d.pEla || 0) + 1;
            }
            database.update(up);
        });
    }

    function resetarPartida() {
        database.update({ estado: 'resetando', vencedorRodada: null });
        setTimeout(() => {
            database.update({ 
                estado: 'jogando', cEle: [], cEla: [], 
                stopEle: false, stopEla: false, turno: 'Ele' 
            });
        }, 500);
    }
</script>
</body>
</html>
