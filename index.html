<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackjack Arena Premium 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --neon-gold: #ffcc00;
            --neon-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; background: #050a05; color: white; }

        /* EFEITO DE TREMOR (SCREEN SHAKE) */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(-1deg); }
            40% { transform: translate(3px, 2px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            80% { transform: translate(3px, 1px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }
        .shake-it { animation: shake 0.4s; }

        #mesa { 
            width: 100vw; height: 100vh; 
            background: radial-gradient(circle at center, #1a4a2e 0%, #05150a 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
            border: 4px solid rgba(255,255,255,0.05); box-sizing: border-box; 
        }

        /* SCOREBOARD ESTILO GLASSMORPHISM */
        .scoreboard { 
            display: flex; justify-content: space-between; width: 90%; 
            background: var(--glass); backdrop-filter: blur(15px); 
            padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            margin-top: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .score-val { font-size: 1.8rem; color: var(--neon-gold); font-weight: 900; text-shadow: 0 0 10px rgba(255,204,0,0.5); }

        .turn-indicator { 
            padding: 6px 18px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; 
            letter-spacing: 1px; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s;
        }
        .active-turn { background: var(--neon-gold); color: #000; box-shadow: 0 0 20px var(--neon-gold); border-color: white; }

        /* CARTAS PREMIUM */
        .card { 
            width: 80px; height: 115px; background: white; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.8rem; font-weight: 900; color: #1a1a1a; 
            box-shadow: 4px 4px 15px rgba(0,0,0,0.6); margin-left: -50px;
            border: 1px solid #ddd; position: relative;
            animation: dealCard 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .card::after { content: '♠'; position: absolute; bottom: 5px; right: 5px; font-size: 0.8rem; color: #444; }

        @keyframes dealCard { 
            from { transform: translateY(-200px) rotate(20deg); opacity: 0; filter: blur(5px); } 
            to { transform: translateY(0) rotate(0deg); opacity: 1; filter: blur(0); } 
        }

        /* BOTÕES ESTILIZADOS */
        .btn-game { 
            width: 80px; height: 80px; border-radius: 50%; border: none;
            color: white; font-weight: 800; font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .btn-hit { background: linear-gradient(135deg, #0066ff, #00d4ff); }
        .btn-stay { background: linear-gradient(135deg, #ff0044, #880000); }
        .btn-game:active { transform: scale(0.9); }
        .disabled { opacity: 0.1; filter: grayscale(1); pointer-events: none; }

        /* MODAIS MODERNOS */
        .modal-alerta { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; backdrop-filter: blur(10px); }
        .modal-alerta img { width: 280px; border-radius: 25px; margin-bottom: 20px; box-shadow: 0 0 40px rgba(255,255,255,0.1); }
        
        .avatar-main { width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--glass); background-size: cover; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<audio id="snd-card" src="https://files.catbox.moe/n9jekp.m4a"></audio>
<audio id="snd-boom" src="https://files.catbox.moe/vydo44.mp3"></audio>
<audio id="snd-win" src="https://files.catbox.moe/p6x15o.mp3"></audio>

<div id="modal-ganhou" class="modal-alerta">
    <img src="https://files.catbox.moe/xkxzyl.webp">
    <h2 style="color: var(--neon-gold); font-size: 2rem;">VITÓRIA ÉPICA!</h2>
    <p id="msg-ganhou"></p>
    <button style="padding: 18px 40px; background: var(--neon-gold); border: none; border-radius: 40px; font-weight: 900; cursor:pointer;" onclick="novoJogo()">QUERO MAIS UMA</button>
</div>

<div id="modal-perdeu" class="modal-alerta">
    <img id="img-perdeu" src="https://files.catbox.moe/2hwdjc.gif">
    <h2 id="titulo-perdeu" style="color: #ff4444; font-size: 2rem;">BOOM!</h2>
    <p id="msg-perdeu"></p>
    <button style="padding: 18px 40px; background: white; border: none; border-radius: 40px; font-weight: 900; cursor:pointer;" onclick="novoJogo()">TENTAR REVANCHE</button>
</div>

<div id="overlay">
    <h1 style="color: var(--neon-gold); letter-spacing: 4px;">BLACKJACK <span style="color:white">2026</span></h1>
    <div class="avatar-grid" id="avatarGrid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px;"></div>
    <div style="display: flex; gap: 20px; margin-bottom: 30px;">
        <button onclick="setRole('Ele')" id="bEle" style="padding: 15px 35px; background: #0066ff; color: white; border: none; border-radius: 12px; font-weight: bold;">ELE</button>
        <button onclick="setRole('Ela')" id="bEla" style="padding: 15px 35px; background: #ff007f; color: white; border: none; border-radius: 12px; font-weight: bold;">ELA</button>
    </div>
    <button id="btnStart" style="padding: 20px 60px; background: var(--neon-gold); border: none; display: none; font-weight: 900; border-radius: 50px; box-shadow: 0 0 30px var(--neon-gold);" onclick="entrar()">ENTRAR NA ARENA</button>
    <button onclick="resetGeral()" style="margin-top: 30px; background: none; border: 1px solid #333; color: #555; font-size: 0.6rem;">RESET DATA</button>
</div>

<div id="mesa">
    <div class="scoreboard">
        <div style="text-align: center;">
            <div id="mini-ele" style="width:50px; height:50px; border-radius:50%; background-size:cover; border:2px solid #0066ff"></div>
            <span id="p-ele" class="score-val">0</span>
        </div>
        <div id="indicador-turno" class="turn-indicator">CARREGANDO...</div>
        <div style="text-align: center;">
            <div id="mini-ela" style="width:50px; height:50px; border-radius:50%; background-size:cover; border:2px solid #ff007f"></div>
            <span id="p-ela" class="score-val">0</span>
        </div>
    </div>

    <div class="avatar-main" id="oponente-img" style="transform: scale(0.8); opacity: 0.7;"></div>

    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div id="soma-label" style="background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; font-weight: 900; color: var(--neon-gold); margin-bottom: 15px;">0</div>
        <div class="hand" id="minhas-cartas" style="margin-bottom: 20px;"></div>
        <div class="avatar-main" id="meu-avatar-img"></div>
    </div>

    <div class="controls" id="botoes-jogo" style="display:flex; gap: 40px; padding-bottom: 40px;">
        <button class="btn-game btn-hit" onclick="comprar()">PEDIR</button>
        <button class="btn-game btn-stay" onclick="parar()">PARAR</button>
    </div>
</div>

<script>
    const db = firebase.database().ref("blackjack_final_v11");
    let meuID = "", meuAvUrl = "";
    const sCard = document.getElementById('snd-card'), sBoom = document.getElementById('snd-boom'), sWin = document.getElementById('snd-win');

    // GERAR AVATARES
    for(let i=0; i<10; i++) {
        const url = `https://api.dicebear.com/7.x/avataaars/svg?seed=${i+20}`;
        const div = document.createElement('div');
        div.style = `width:50px; height:50px; border-radius:50%; background: white url('${url}') center/cover; border:2px solid #333; cursor:pointer;`;
        div.onclick = () => {
            meuAvUrl = url;
            document.querySelectorAll('#avatarGrid div').forEach(e => e.style.borderColor = "#333");
            div.style.borderColor = "var(--neon-gold)";
            if(meuID) document.getElementById('btnStart').style.display = 'block';
        };
        document.getElementById('avatarGrid').appendChild(div);
    }

    function setRole(r) {
        meuID = r;
        document.getElementById('bEle').style.boxShadow = r==='Ele'?'0 0 15px #0066ff':'none';
        document.getElementById('bEla').style.boxShadow = r==='Ela'?'0 0 15px #ff007f':'none';
        if(meuAvUrl) document.getElementById('btnStart').style.display = 'block';
    }

    function entrar() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('meu-avatar-img').style.backgroundImage = `url('${meuAvUrl}')`;
        db.update({ [meuID === 'Ele' ? 'avEle' : 'avEla']: meuAvUrl });
        db.once('value', s => { if(!s.val() || !s.val().turno) db.update({ turno: 'Ele' }); });
    }

    db.on('value', (snapshot) => {
        const d = snapshot.val() || { cEle: [], cEla: [], pEle: 0, pEla: 0, turno: 'Ele' };
        
        // Sincronizar Modais
        if ((!d.cEle || d.cEle.length === 0) && (!d.cEla || d.cEla.length === 0)) {
            document.getElementById('modal-ganhou').style.display = 'none';
            document.getElementById('modal-perdeu').style.display = 'none';
        }

        // Atualizar Placar e Avatares
        document.getElementById('p-ele').innerText = d.pEle || 0;
        document.getElementById('p-ela').innerText = d.pEla || 0;
        if(d.avEle) document.getElementById('mini-ele').style.backgroundImage = `url('${d.avEle}')`;
        if(d.avEla) document.getElementById('mini-ela').style.backgroundImage = `url('${d.avEla}')`;
        const imgOp = meuID === 'Ele' ? d.avEla : d.avEle;
        if(imgOp) document.getElementById('oponente-img').style.backgroundImage = `url('${imgOp}')`;

        // Indicador de Turno
        const ind = document.getElementById('indicador-turno');
        const bts = document.getElementById('botoes-jogo');
        if(d.turno === meuID) {
            ind.innerText = "SUA VEZ"; ind.className = "turn-indicator active-turn";
            bts.classList.remove('disabled');
        } else {
            ind.innerText = "VEZ DE " + (d.turno || "ELE"); ind.className = "turn-indicator";
            bts.classList.add('disabled');
        }

        // Cartas e Soma
        const minhas = meuID === "Ele" ? (d.cEle || []) : (d.cEla || []);
        const area = document.getElementById('minhas-cartas');
        if (minhas.length > area.children.length) { sCard.currentTime = 0; sCard.play(); }

        area.innerHTML = "";
        let somaEu = 0;
        minhas.forEach(n => {
            somaEu += n;
            const c = document.createElement('div'); c.className = "card"; c.innerText = n; area.appendChild(c);
        });
        document.getElementById('soma-label').innerText = somaEu;

        // Efeito de Tremedeira ao Estourar
        if(somaEu > 21 && !d.vitoriaProcessada) {
            document.getElementById('mesa').classList.add('shake-it');
            setTimeout(() => document.getElementById('mesa').classList.remove('shake-it'), 500);
            exibirResultado('perdeu', somaEu, 0, true);
            processarVitoria(meuID === 'Ele' ? 'Ela' : 'Ele');
        } else if(somaEu === 21 && !d.vitoriaProcessada && d.turno === meuID) {
            exibirResultado('ganhou', 21, 0);
            processarVitoria(meuID);
        }

        if(d.parouEle && d.parouEla && !d.vitoriaProcessada) compararFinal(d);
    });

    function compararFinal(d) {
        let sEle = (d.cEle || []).reduce((a,b)=>a+b,0), sEla = (d.cEla || []).reduce((a,b)=>a+b,0);
        let meuS = meuID === 'Ele' ? sEle : sEla, opS = meuID === 'Ele' ? sEla : sEle;
        let v = sEle > 21 ? 'Ela' : sEla > 21 ? 'Ele' : sEle > sEla ? 'Ele' : sEla > sEle ? 'Ela' : 'Empate';

        if(v === meuID) exibirResultado('ganhou', meuS, opS);
        else if(v === 'Empate') { alert("EMPATE!"); novoJogo(); }
        else exibirResultado('perdeu', meuS, opS, false);
        if(v !== "Empate") processarVitoria(v);
    }

    function exibirResultado(tipo, meuS, opS, estouro) {
        if(tipo === 'ganhou') {
            sWin.play();
            // EXPLOSÃO DE CONFETES DE 2026
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ffcc00', '#ffffff'] });
            document.getElementById('msg-ganhou').innerText = `Placar Final: ${meuS} a ${opS}`;
            document.getElementById('modal-ganhou').style.display = 'flex';
        } else {
            sBoom.play();
            const tit = document.getElementById('titulo-perdeu'), msg = document.getElementById('msg-perdeu'), img = document.getElementById('img-perdeu');
            if(estouro) { tit.innerText = "BOOM! ESTOUROU"; msg.innerText = `Você fez ${meuS}!`; img.style.display = "block"; }
            else { tit.innerText = "MUITO CEDO..."; msg.innerText = `Você: ${meuS} vs Oponente: ${opS}`; img.style.display = "none"; }
            document.getElementById('modal-perdeu').style.display = 'flex';
        }
    }

    function comprar() {
        const n = Math.floor(Math.random() * 10) + 2;
        db.once('value', s => {
            let mao = meuID === 'Ele' ? (s.val().cEle || []) : (s.val().cEla || []);
            mao.push(n);
            db.update({ [meuID === 'Ele' ? 'cEle' : 'cEla']: mao });
        });
    }

    function parar() {
        const prox = meuID === 'Ele' ? 'Ela' : 'Ele';
        db.update({ turno: prox, [meuID === 'Ele' ? 'parouEle' : 'parouEla']: true });
    }

    function processarVitoria(v) {
        db.once('value', s => {
            if(s.val().vitoriaProcessada) return;
            let f = v === 'Ele' ? 'pEle' : 'pEla';
            db.update({ [f]: (s.val()[f] || 0) + 1, vitoriaProcessada: true });
        });
    }

    function novoJogo() {
        db.update({ cEle: [], cEla: [], parouEle: false, parouEla: false, vitoriaProcessada: false, turno: 'Ele' });
    }

    function resetGeral() { if(confirm("Zerar Arena?")) db.set({ cEle:[], cEla:[], pEle:0, pEla:0, parouEle:false, parouEla:false, vitoriaProcessada:false, turno:'Ele' }); }
</script>
</body>
</html>
